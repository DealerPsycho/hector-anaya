<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Héctor Anaya | Inntec</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
}

.container{
    max-width:420px;
    margin:0 auto;
    min-height:100vh;
    background:#FFF;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

.header{
    background:#005DAA;
    padding:40px 20px;
    text-align:center;
    color:#FFF;
}

.header img.logo{
    width:220px;
}

.photo{
    margin-top:-40px;
    text-align:center;
}

.photo img{
    width:180px;
    height:180px;
    border-radius:50%;
    border:6px solid #FFF;
    object-fit:cover;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

.info{
    text-align:center;
    padding:20px;
}

.info h1{
    margin:0;
    font-size:42px;
    color:#364152;
}

.info h2{
    margin-top:10px;
    color:#009EE2;
    font-weight:normal;
}

.buttons{
    padding:20px;
}

.buttons a{
    display:block;
    text-decoration:none;
    color:#FFF;
    background:#005DAA;
    padding:15px;
    margin-bottom:15px;
    text-align:center;
    border-radius:8px;
    font-size:18px;
    transition:.2s;
}

.buttons a:hover{
    background:#004580;
}

.footer{
    background:#00A3D9;
    color:#FFF;
    text-align:center;
    padding:20px;
    margin-top:20px;
}

.footer p{
    margin:0;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <img class="logo" src="Elementos/Logo_InntecMP_Reg_Bnco.png">
    </div>

    <div class="photo">
        <img src="Elementos/Hector_Anaya.png" alt="Héctor Anaya">
    </div>

    <div class="info">
        <h1>HÉCTOR ANAYA</h1>
        <h2>Director General</h2>
    </div>

    <div class="buttons">

        <a href="Hector_Anaya.vcf">
            Guardar contacto
        </a>

        <a href="https://wa.me/525512345678">
            WhatsApp
        </a>

        <a href="mailto:hector.anaya@inntec.com.mx">
            Correo electrónico
        </a>

        <a href="https://www.linkedin.com/in/hector-anaya">
            LinkedIn
        </a>

        <a href="https://www.inntec.com.mx">
            Sitio Web
        </a>

    </div>

    <div class="footer">
        <p>Inntec Medios de Pago</p>
        <p>Innovación que convierte recursos en resultados.</p>
    </div>

</div>

</body>
</html>
